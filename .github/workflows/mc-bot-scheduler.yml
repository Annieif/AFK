name: Minecraft Bot AFK Scheduler

on:
  schedule:
    # 每天北京时间 2:00-4:00 (UTC+8 -> UTC 18:00)
    - cron: '0 18 * * *'
    # 周一到周五北京时间 13:00-14:00 (UTC+8 -> UTC 5:00)
    - cron: '0 5 * * 1-5'
  workflow_dispatch:
    inputs:
      name:
        description: '机器人名称 (首字母作为前缀,其余作为nick)'
        required: false
        default: 'Annieif'
      server:
        description: '服务器地址 (host:port)'
        required: false
        default: 'nohair.top:25565'
      count:
        description: '机器人数量'
        required: false
        default: '1'
      duration:
        description: '运行时长 (分钟)'
        required: false
        default: '20'
      delay_min:
        description: '连接延迟最小值 (毫秒)'
        required: false
        default: '1000'
      delay_max:
        description: '连接延迟最大值 (毫秒)'
        required: false
        default: '3000'

jobs:
  afk-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 130

    env:
      BOT_NAME: ${{ github.event.inputs.name || 'Annieif' }}
      BOT_SERVER: ${{ github.event.inputs.server || 'nohair.top:25565' }}
      BOT_COUNT: ${{ github.event.inputs.count || '1' }}
      BOT_DURATION: ${{ github.event.inputs.duration || '' }}
      BOT_DELAY_MIN: ${{ github.event.inputs.delay_min || '4000' }}
      BOT_DELAY_MAX: ${{ github.event.inputs.delay_max || '5000' }}

    steps:
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Download ViaProxy
        run: |
          wget -q "https://github.com/ViaVersion/ViaProxy/releases/download/v3.4.11/ViaProxy-3.4.11.jar"

      - name: Generate ViaProxy config
        run: |
          cat > viaproxy.yml << EOF
          bind-address: 0.0.0.0:25568
          target-address: $BOT_SERVER
          proxy-online-mode: false
          auth-method: NONE
          EOF

      - name: Configure ViaProxy
        run: |
          pip3 install pyyaml -q
          python3 << 'PYEOF'
          import yaml
          import os

          with open('viaproxy.yml', 'r') as f:
              config = yaml.safe_load(f)

          target = os.environ.get('BOT_SERVER', 'nohair.top:25565')

          config['bind-address'] = '0.0.0.0:25568'
          config['target-address'] = target
          config['proxy-online-mode'] = False
          config['auth-method'] = 'NONE'

          print(f"Set bind-address = 0.0.0.0:25568")
          print(f"Set target-address = {target}")
          print(f"Set proxy-online-mode = False")
          print(f"Set auth-method = NONE")

          with open('viaproxy.yml', 'w') as f:
              yaml.dump(config, f, default_flow_style=False)

          print('=== ViaProxy Config ===')
          with open('viaproxy.yml', 'r') as f:
              print(f.read())
          PYEOF

      - name: Start ViaProxy
        run: |
          java -Djava.awt.headless=true -jar ViaProxy-3.4.11.jar config viaproxy.yml &
          echo $! > viaproxy.pid
          # 等待 ViaProxy 启动就绪
          sleep 15
          # 检查进程是否存活
          if ! kill -0 $(cat viaproxy.pid) 2>/dev/null; then
            echo "ViaProxy failed to start"
            exit 1
          fi
          echo "ViaProxy started successfully"

      - name: Download mc-bots
        run: |
          wget -q "https://github.com/crpmax/mc-bots/releases/download/1.2.17/mc-bots-1.2.17.jar"

      - name: Create nicks file
        run: |
          # 从 BOT_NAME 提取 nick (去掉第一个字符作为前缀)
          NICK="${BOT_NAME:1}"
          PREFIX="${BOT_NAME:0:1}"
          echo "$NICK" > nicks.txt
          echo "Prefix: $PREFIX, Nick: $NICK"

      - name: Run mc-bots
        run: |
          # 从 BOT_NAME 提取前缀和 nick
          PREFIX="${BOT_NAME:0:1}"
          NICK="${BOT_NAME:1}"
          # 根据触发方式确定运行时长
          if [ -n "$BOT_DURATION" ]; then
            DURATION=$(($BOT_DURATION * 60))
            echo "Slot: manual trigger ($BOT_DURATION minutes)"
          else
            UTC_HOUR=$(date -u +%H)
            if [ "$UTC_HOUR" = "18" ]; then
              DURATION=7140  # 2:00-4:00 北京时间, ~119分钟
              echo "Slot: 2:00-4:00 Beijing (2 hours)"
            elif [ "$UTC_HOUR" = "5" ]; then
              DURATION=3540  # 13:00-14:00 北京时间, ~59分钟
              echo "Slot: 13:00-14:00 Beijing (1 hour)"
            else
              DURATION=3540
              echo "Slot: default (1 hour)"
            fi
          fi
          echo "Duration: ${DURATION}s"
          echo "Server: localhost:25568 (ViaProxy) -> $BOT_SERVER"
          echo "Bot: prefix=$PREFIX, nick=$NICK, count=$BOT_COUNT, delay=$BOT_DELAY_MIN-$BOT_DELAY_MAX ms"
          # 使用 script 命令为 mc-bots 提供伪终端 (JLine 需要 TTY 才能正常工作)
          # 启用完整 listener (不带 -x/-m) 以获取详细的 join/chat 日志用于诊断
          timeout --foreground $DURATION script -qfc "java -jar mc-bots-1.2.17.jar -s localhost:25568 -p $PREFIX -c $BOT_COUNT -d $BOT_DELAY_MIN $BOT_DELAY_MAX --nicks nicks.txt" /dev/null 2>&1 | tee mc-bots.log || EXIT_CODE=$?
          if [ "${EXIT_CODE:-0}" = "124" ]; then
            echo "mc-bots stopped after ${DURATION}s (timeout reached)"
          elif [ "${EXIT_CODE:-0}" != "0" ]; then
            echo "mc-bots exited with error code $EXIT_CODE"
            exit $EXIT_CODE
          else
            echo "mc-bots session ended"
          fi

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mc-bots-log-${{ github.run_id }}-${{ github.run_attempt }}
          path: mc-bots.log
          retention-days: 7

      - name: Cleanup
        if: always()
        run: |
          if [ -f viaproxy.pid ]; then
            kill $(cat viaproxy.pid) 2>/dev/null || true
            echo "ViaProxy stopped"
          fi